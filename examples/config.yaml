# Example config — copy to a path outside the repo or edit paths for your machine.
# See DETAILED_DESIGN.md for full field reference.

version: 1
timezone: "Asia/Tokyo"

defaults:
  vault_path: "/Users/you/ObsidianVault"
  vault_provider: "mock"
  timezone: "Asia/Tokyo"
  rss_provider: "feedsmith"
  state:
    driver: "sqlite"
    dsn: "/Users/you/.obsflow/state.db"
  auth:
    x_bearer_token_env: "X_BEARER_TOKEN"
    x_oauth2_access_token_env: "X_OAUTH2_ACCESS_TOKEN"
    ai_api_key_env: "AI_API_KEY"
    slack_webhook_env: "SLACK_WEBHOOK_URL"
    cursor_api_key_env: "CURSOR_API_KEY"
  alert:
    provider: "mock"
    slack_webhook_env: "SLACK_WEBHOOK_URL"

sources:
  rss:
    - id: "hn"
      enabled: true
      url: "https://news.ycombinator.com/rss"
      schedule: "*/30 * * * *"

  x:
    provider: "mock"
    search: []
    lists: []
    bookmarks: []

ai:
  provider: "mock"

jobs:
  - id: "summarize-main"
    type: "summarize"
    enabled: true
    schedule: "*/15 * * * *"
